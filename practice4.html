<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Practice 4 – Multiplication Table</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .practice-eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .practice-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 8vw, 72px);
      line-height: 0.95;
      color: var(--text);
      margin-bottom: 40px;
    }

    .practice-title span { color: #3a7bd5; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 8px 0 16px;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 32px;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-btn:hover { color: var(--accent); }

    .table-wrap { overflow-x: auto; }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 13px;
    }

    th, td {
      padding: 8px 12px;
      text-align: center;
      border: 1px solid var(--border);
    }

    th {
      background: rgba(255,255,255,0.04);
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 0.08em;
    }

    td { color: rgba(240,240,238,0.7); }

    tr:hover td {
      background: rgba(255,255,255,0.02);
      color: var(--text);
    }

    .error-msg {
      font-size: 14px;
      color: #c0152a;
    }

    body { background: #0c0d14; }
  </style>
</head>
<body>
  <div class="page">

    <p class="practice-eyebrow">EECS 348 · Lab 6</p>
    <h1 class="practice-title">Multiplication <span>Table</span></h1>

    <a href="index.html" class="back-btn">← Back</a>

    <div class="card card--wide">
      <p class="card-label">// Input</p>
      <div class="divider"></div>
      <div class="table-wrap">

        <form method="GET" action="multiplication.php">
          <div class="field">
            <label for="number">Table Size (N)</label>
            <input type="number" id="number" name="number" min="1" placeholder="Enter a number"/>
          </div>
          <button type="submit" class="apply-btn">Generate Table</button>
        </form>

      </div>
    </div>

  </div>
</body>
</html>
